<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Stack Python App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1>Full Stack Web App</h1>
        <div class="card">
            <input type="text" id="dataInput" placeholder="Enter some data to save...">
            <button onclick="submitData()">Submit Data</button>
        </div>
        <div class="card">
            <h2>Saved Data from Database</h2>
            <ul id="dataList">
                <li style="color: var(--text-muted); text-align: center;">Loading data...</li>
            </ul>
            <button style="margin-top: 1rem; background-color: var(--secondary);" onclick="fetchData()">Refresh
                List</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
